syntax = "proto3";

package katapult.agent.v1alpha1;

option go_package = "github.com/maxitosh/katapult/api/proto/agent/v1alpha1;agentv1alpha1";

service AgentService {
  // Register registers an agent with the control plane.
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Heartbeat sends a periodic health check with updated PVC inventory.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // CreateTransfer creates a new volume transfer between PVCs.
  rpc CreateTransfer(CreateTransferRequest) returns (CreateTransferResponse);

  // CancelTransfer cancels an active transfer.
  rpc CancelTransfer(CancelTransferRequest) returns (CancelTransferResponse);

  // ReportProgress receives progress reports from agents.
  rpc ReportProgress(ReportProgressRequest) returns (ReportProgressResponse);

  // StreamCommands opens a server-streaming channel for agent commands.
  rpc StreamCommands(StreamCommandsRequest) returns (stream AgentCommand);
}

message ToolVersions {
  string tar_version = 1;
  string zstd_version = 2;
  string stunnel_version = 3;
}

message PVCInfo {
  string pvc_name = 1;
  int64 size_bytes = 2;
  string storage_class = 3;
  string node_affinity = 4;
}

message RegisterRequest {
  string cluster_id = 1;
  string node_name = 2;
  ToolVersions tools = 3;
  repeated PVCInfo pvcs = 4;
  string jwt_token = 5;
}

message RegisterResponse {
  string agent_id = 1;
}

message HeartbeatRequest {
  string agent_id = 1;
  repeated PVCInfo pvcs = 2;
}

message HeartbeatResponse {}

// Transfer Engine messages.

message CreateTransferRequest {
  string source_cluster = 1;
  string source_pvc = 2;
  string destination_cluster = 3;
  string destination_pvc = 4;
  optional string strategy_override = 5;
  bool allow_overwrite = 6;
  optional int32 retry_max = 7;
  string created_by = 8;
}

message CreateTransferResponse {
  string transfer_id = 1;
  string state = 2;
}

message CancelTransferRequest {
  string transfer_id = 1;
}

message CancelTransferResponse {
  string transfer_id = 1;
  string state = 2;
}

message ReportProgressRequest {
  string transfer_id = 1;
  int64 bytes_transferred = 2;
  int64 bytes_total = 3;
  double speed = 4;
  int32 chunks_completed = 5;
  int32 chunks_total = 6;
  string status = 7;
  string error_message = 8;
}

message ReportProgressResponse {}

message TransferCommand {
  string transfer_id = 1;
  string strategy = 2;
  string source_pvc = 3;
  string destination_pvc = 4;
  string credentials = 5;
  int64 chunk_size = 6;
}

message CancelCommand {
  string transfer_id = 1;
}

message AgentCommand {
  oneof command {
    TransferCommand transfer = 1;
    CancelCommand cancel = 2;
  }
}

message StreamCommandsRequest {
  string agent_id = 1;
}

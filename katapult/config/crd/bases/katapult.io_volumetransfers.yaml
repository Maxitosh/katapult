apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: volumetransfers.katapult.io
spec:
  group: katapult.io
  names:
    kind: VolumeTransfer
    listKind: VolumeTransferList
    plural: volumetransfers
    singular: volumetransfer
    shortNames:
      - vt
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Source
          type: string
          jsonPath: .spec.sourceCluster
        - name: Destination
          type: string
          jsonPath: .spec.destinationCluster
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - sourceCluster
                - sourcePVC
                - destinationCluster
                - destinationPVC
              properties:
                sourceCluster:
                  type: string
                sourcePVC:
                  type: string
                destinationCluster:
                  type: string
                destinationPVC:
                  type: string
                strategy:
                  type: string
                  enum: [stream, s3, direct]
                allowOverwrite:
                  type: boolean
                retryMax:
                  type: integer
                  minimum: 1
            status:
              type: object
              properties:
                transferID:
                  type: string
                phase:
                  type: string
                bytesTransferred:
                  type: integer
                  format: int64
                bytesTotal:
                  type: integer
                  format: int64
                chunksCompleted:
                  type: integer
                chunksTotal:
                  type: integer
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      observedGeneration:
                        type: integer
                        format: int64

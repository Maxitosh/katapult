apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: katapult-system
  labels:
    app.kubernetes.io/name: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          command:
            - server
            - /data
          ports:
            - name: api
              containerPort: 9000
              protocol: TCP
          env:
            - name: MINIO_ROOT_USER
              value: "minioadmin"
            - name: MINIO_ROOT_PASSWORD
              value: "minioadmin"
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: katapult-system
  labels:
    app.kubernetes.io/name: minio
spec:
  selector:
    app.kubernetes.io/name: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
      protocol: TCP

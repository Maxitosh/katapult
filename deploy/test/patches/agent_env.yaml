apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: katapult-agent
  namespace: katapult-system
spec:
  template:
    spec:
      containers:
        - name: agent
          env:
            - name: CLUSTER_ID
              value: kind
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

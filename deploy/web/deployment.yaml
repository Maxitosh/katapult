apiVersion: apps/v1
kind: Deployment
metadata:
  name: katapult-web
  namespace: katapult-system
  labels:
    app.kubernetes.io/name: katapult-web
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: katapult-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: katapult-web
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: web
          image: katapult-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: nginx-config
          configMap:
            name: katapult-web-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: katapult-web
  namespace: katapult-system
  labels:
    app.kubernetes.io/name: katapult-web
    app.kubernetes.io/component: web
spec:
  selector:
    app.kubernetes.io/name: katapult-web
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Layers on top of the test overlay, overriding only image tags (:local instead of :test)
# and adding web UI NodePort exposure.
# TODO: deploy/test/postgres.yaml duplicates the schema from katapult/internal/store/postgres/migrations/.
#   The controlplane should auto-migrate on startup, removing the need for the hardcoded ConfigMap.
resources:
  - ../test
patches:
  - path: patches/manager_image.yaml
  - path: patches/agent_image.yaml
  - path: patches/web_image.yaml
  - path: patches/web_nodeport.yaml

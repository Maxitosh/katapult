apiVersion: v1
kind: Service
metadata:
  name: katapult-controlplane
  namespace: katapult-system
  labels:
    app.kubernetes.io/name: katapult-controlplane
    app.kubernetes.io/component: controlplane
spec:
  selector:
    app.kubernetes.io/name: katapult-controlplane
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: grpc
      port: 9090
      targetPort: 9090
      protocol: TCP
    - name: metrics
      port: 2112
      targetPort: 2112
      protocol: TCP
